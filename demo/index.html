<!DOCTYPE html>
<html>

<head>
    <title>Cuestionario</title>
</head>

<body>
    <form method="post" action="program">
        <p>
        <h2>Rellene el cuestionario:</h2>
        <p><b>Su nombre:</b> <input type="text" name="name" size="25" maxlength="25"></p>
        <p><b>Su apellido:</b> <input type="text" name="surname" size="25" maxlength="25"></p>
        <p><b>Su edad:</b> <input type="number" name="age" max="18" min="10" value="10"></p>

        <p><b>Elija los cursos que le interesan:</b></p>
        <p><input type="checkbox" name="courses" value="scratch"> Scratch</p>
        <p><input type="checkbox" name="courses" value="game">Gamedesign</p>
        <p><input type="checkbox" name="courses" value="ps">Python Start</p>
        <p><input type="checkbox" name="courses" value="pp">Python Pro</p>

        <p><b>Comentario adicional:</b> <textarea></textarea></p>

        <p><input type="submit" name="btn" value="Enviar"></p>

    </form>
</body>

</html>
